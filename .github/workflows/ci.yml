# ────────────────────────────────────────────────────────────────────────────
# Noctis CI Pipeline — runs on push to main and pull requests targeting main
# ────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Contract unit tests ────────────────────────────────────────────
  contract-tests:
    name: Contract Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-contract-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-contract-

      - name: Run workspace tests (release)
        run: cargo test --workspace --release

  # ── Job 2: Frontend build ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ── Job 3: Circuits dev build ─────────────────────────────────────────────
  circuits-build:
    name: Circuit Build (Dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ptau artifacts
        id: cache-ptau
        uses: actions/cache@v4
        with:
          path: circuits/build/*.ptau
          key: ${{ runner.os }}-ptau-dev-${{ hashFiles('circuits/build-dev.sh') }}
          restore-keys: |
            ${{ runner.os }}-ptau-dev-

      - name: Install circom v2.2.3
        if: steps.cache-ptau.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64.tar.gz
          tar -xzf circom-linux-amd64.tar.gz
          sudo mv circom /usr/local/bin/
          rm circom-linux-amd64.tar.gz
          circom --version

      - name: Install snarkjs
        run: npm install -g snarkjs

      - name: Install circuit dependencies
        working-directory: circuits
        run: npm ci --omit=dev

      - name: Build circuits (dev, 2 recipients)
        if: steps.cache-ptau.outputs.cache-hit != 'true'
        working-directory: circuits
        run: bash build-dev.sh

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: circuit-wasm
          path: circuits/build/*.wasm
          if-no-files-found: error

      - name: Upload ZKEY artifact
        uses: actions/upload-artifact@v4
        with:
          name: circuit-zkey
          path: circuits/build/*.zkey
          if-no-files-found: error

      - name: Upload VKEY artifact
        uses: actions/upload-artifact@v4
        with:
          name: circuit-vkey
          path: circuits/build/*.vkey.json
          if-no-files-found: error

  # ── Job 4: Circuits existence check ───────────────────────────────────────
  circuits-check:
    name: Circuits Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify payroll circuit exists
        run: |
          if [ -f circuits/payroll_circuit.circom ]; then
            echo "payroll_circuit.circom found"
          else
            echo "payroll_circuit.circom MISSING"
            exit 1
          fi

  # ── Job 5: E2E testnet tests (push to main only) ─────────────────────────
  e2e-tests:
    name: E2E Testnet Tests
    runs-on: ubuntu-latest
    needs: [contract-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run E2E testnet tests
        working-directory: tests
        run: npx tsx e2e-testnet.ts
        env:
          STELLAR_NETWORK: TESTNET
