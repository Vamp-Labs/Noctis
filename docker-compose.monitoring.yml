# ────────────────────────────────────────────────────────────────────────────
# Noctis Monitoring Stack — Prometheus + Grafana
# ────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#   Grafana: http://localhost:3000 (admin / admin)
#   Prometheus: http://localhost:9090
#
# This stack scrapes the Noctis health endpoints plus the Stellar RPC.
# The Grafana dashboard is pre-configured via the provisioning directory.
# ────────────────────────────────────────────────────────────────────────────

version: "3.8"

networks:
  noctis-mon:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: noctis-prometheus
    restart: unless-stopped
    networks:
      - noctis-mon
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: noctis-grafana
    restart: unless-stopped
    networks:
      - noctis-mon
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards-definitions:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
