# ────────────────────────────────────────────────────────────────────────────
# Grafana Datasource Provisioning — Prometheus
# ────────────────────────────────────────────────────────────────────────────
# Grafana will automatically load this file on startup.
# Reference: https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources
# ────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "60s"
      queryTimeout: "30s"
      httpMethod: "POST"
